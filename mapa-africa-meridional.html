<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>África Meridional — 24 Destinos Imperdíveis</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0d1117;color:#e6edf3;overflow:hidden}
body{display:flex;flex-direction:column}
#topbar{background:#161b22;border-bottom:1px solid #30363d;padding:10px 16px;display:flex;align-items:center;gap:8px;flex-shrink:0;flex-wrap:wrap}
#topbar h1{font-size:.95rem;font-weight:700;white-space:nowrap}
#topbar p{font-size:.75rem;color:#8b949e}
#mob-sb-btn{display:none;align-items:center;justify-content:center;width:32px;height:32px;border-radius:7px;border:1px solid #30363d;background:transparent;color:#8b949e;cursor:pointer;font-size:1rem;flex-shrink:0;line-height:1}
#mob-sb-btn:hover{background:#21262d;color:#e6edf3}
.filter-row{display:flex;gap:6px;flex-wrap:wrap;margin-left:auto;align-items:center}
.filter-btn{padding:5px 12px;border-radius:20px;border:1px solid #30363d;background:transparent;color:#8b949e;cursor:pointer;font-size:.74rem;transition:all .15s;white-space:nowrap;flex-shrink:0}
.filter-btn.active,.filter-btn:hover{background:#2d6a4f;color:#fff;border-color:#2d6a4f}
#routes-btn.active{background:#1d3a6e!important;color:#93c5fd!important;border-color:#3b82f6!important}
#wrap{display:flex;flex:1;overflow:hidden}
#sidebar{width:230px;background:#161b22;border-right:1px solid #30363d;overflow-y:auto;flex-shrink:0;transition:width .25s;position:relative}
#sidebar.collapsed{width:0;overflow:hidden}
#sb-toggle{width:14px;height:44px;background:#21262d;border:1px solid #30363d;border-left:none;border-radius:0 7px 7px 0;cursor:pointer;color:#8b949e;font-size:.65rem;padding:0;flex-shrink:0;align-self:center;transition:background .15s;line-height:1}
#sb-toggle:hover{background:#30363d;color:#e6edf3}
#sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200}
#sb-overlay.show{display:block}
#sb-mob-close{display:none;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid #21262d;position:sticky;top:0;background:#161b22;z-index:5}
#sb-mob-close span{font-size:.72rem;font-weight:700;color:#8b949e;text-transform:uppercase;letter-spacing:.08em}
#sb-mob-close button{background:none;border:none;color:#8b949e;cursor:pointer;font-size:1rem;padding:4px;line-height:1}
#sb-mob-close button:hover{color:#e6edf3}
.cg-header{padding:9px 13px;display:flex;align-items:center;gap:7px;cursor:pointer;transition:background .15s;position:sticky;top:0;background:#161b22;z-index:1;border-bottom:1px solid #21262d}
.cg-header:hover{background:#21262d}
.cdot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.cg-name{font-size:.8rem;font-weight:600}
.spot-list{display:none}
.spot-list.open{display:block}
.si{padding:6px 12px 6px 36px;font-size:.74rem;color:#8b949e;cursor:pointer;border-left:2px solid transparent;transition:all .15s}
.si:hover{color:#e6edf3;background:#21262d;border-left-color:#2d6a4f}
#map-wrap{flex:1;position:relative;min-width:0}
#map{width:100%;height:100%}
#err{display:none;position:absolute;inset:0;align-items:center;justify-content:center;background:#0d1117;color:#f85149;text-align:center;padding:20px;font-size:.88rem;line-height:1.7}
.map-mc{background:none!important;border:none!important;overflow:visible!important}
.mwrap{position:relative;width:25px;height:25px;cursor:pointer}
.mthumb{width:25px;height:25px;border-radius:50%;overflow:hidden;border:2px solid var(--mc,#fff);box-shadow:0 2px 8px rgba(0,0,0,.45);transition:transform .2s,box-shadow .2s;position:relative}
.mthumb img{width:100%;height:100%;object-fit:cover;display:block}
.mflag{position:absolute;bottom:1px;right:1px;width:12px;height:8px;border-radius:2px;overflow:hidden;border:1px solid rgba(255,255,255,.3);pointer-events:none;box-shadow:0 1px 4px rgba(0,0,0,.7)}
.mflag img{width:100%;height:100%;object-fit:cover;display:block}
.mcard{position:absolute;bottom:33px;left:50%;transform:translateX(-50%) scale(.85) translateY(8px);width:min(285px,82vw);background:#161b22;border:1px solid #30363d;border-radius:12px;overflow:hidden;opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;box-shadow:0 8px 32px rgba(0,0,0,.85);transform-origin:50% 100%;cursor:pointer}
.mcard:hover{border-color:#58a6ff}
.mwrap:hover .mcard,.mwrap.open .mcard{opacity:1;transform:translateX(-50%) scale(1) translateY(0);pointer-events:auto}
.mwrap:hover .mthumb,.mwrap.open .mthumb{transform:scale(1.15);box-shadow:0 5px 18px rgba(0,0,0,.6)}
.mcimg{width:100%;height:148px;object-fit:cover;display:block}
.mcfb{width:100%;height:148px;display:none;align-items:center;justify-content:center;font-size:2.5rem}
.mcbody{padding:10px 13px}
.mcctry{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;margin-bottom:3px}
.mctitle{font-size:.95rem;font-weight:700;color:#e6edf3;margin-bottom:5px}
.mcdesc{font-size:.75rem;color:#8b949e;line-height:1.5;margin-bottom:7px}
.mctags{display:flex;gap:4px;flex-wrap:wrap}
.mctag{font-size:.64rem;padding:2px 7px;border-radius:20px;background:#21262d;color:#8b949e;border:1px solid #30363d}
#legend{position:absolute;bottom:18px;right:14px;background:#161b22dd;border:1px solid #30363d;border-radius:10px;padding:9px 13px;z-index:1000;font-size:.72rem;backdrop-filter:blur(4px)}
#legend .lt{font-size:.68rem;color:#8b949e;margin-bottom:5px;font-weight:600;text-transform:uppercase;letter-spacing:.06em}
#legend .li{display:flex;align-items:center;gap:6px;padding:2px 0;color:#8b949e;cursor:pointer;border-radius:4px;transition:color .15s}
#legend .li:hover{color:#e6edf3}
#legend .ldot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.rpop{min-width:220px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
.rpop-name{font-size:.85rem;font-weight:700;color:#e6edf3;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid #30363d}
.rpop-row{display:flex;align-items:flex-start;gap:8px;padding:6px 0;font-size:.76rem;border-top:1px solid #21262d}
.rpop-icon{font-size:.9rem;flex-shrink:0;width:22px;text-align:center;margin-top:1px}
.rpop-info{flex:1;min-width:0}
.rpop-t{color:#e6edf3;font-weight:700}
.rpop-p{color:#3fb950;font-weight:600;margin:0 5px}
.rpop-c{color:#8b949e;font-size:.68rem;display:block;margin-top:2px}
.dark-popup .leaflet-popup-content-wrapper{background:#161b22!important;border:1px solid #30363d!important;border-radius:10px!important;color:#e6edf3!important;box-shadow:0 8px 28px rgba(0,0,0,.75)!important}
.dark-popup .leaflet-popup-content{margin:10px 13px!important}
.dark-popup .leaflet-popup-tip{background:#161b22!important}
.dark-popup .leaflet-popup-close-button{color:#8b949e!important;font-size:16px!important;top:6px!important;right:8px!important}
#rlayer-legend{position:absolute;top:56px;right:14px;background:#161b22ee;border:1px solid #30363d;border-radius:8px;padding:10px 14px;z-index:900;font-size:.72rem;backdrop-filter:blur(4px);display:none;pointer-events:none}
#rlayer-legend.show{display:block}
.rleg-ttl{font-size:.67rem;color:#8b949e;font-weight:700;text-transform:uppercase;letter-spacing:.07em;margin-bottom:7px}
.rleg-row{display:flex;align-items:center;gap:8px;padding:2px 0;color:#c9d1d9}
.rleg-ln{width:26px;height:3px;flex-shrink:0;border-radius:2px}
.dark-tt{background:rgba(13,17,23,.92)!important;border:1px solid #30363d!important;border-radius:5px!important;color:#e6edf3!important;font-size:.73rem!important;font-weight:600!important;box-shadow:0 3px 10px rgba(0,0,0,.65)!important;padding:5px 10px!important;line-height:1.6!important}
.dark-tt::before{display:none!important}
@media(max-width:640px){
  #mob-sb-btn{display:flex}
  #topbar p{display:none}
  #topbar{padding:8px 10px;gap:6px;flex-wrap:wrap}
  .filter-row{margin-left:0;width:100%;flex-wrap:nowrap;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
  .filter-row::-webkit-scrollbar{display:none}
  #sidebar{position:fixed!important;left:0;top:0;bottom:0;z-index:300;width:270px!important;transform:translateX(-100%);transition:transform .25s;overflow-y:auto}
  #sidebar.mobile-open{transform:translateX(0)}
  #sidebar.collapsed{width:270px!important;transform:translateX(-100%)}
  #sb-toggle{display:none}
  #sb-overlay.show{display:block}
  #sb-mob-close{display:flex}
  .cg-header{top:44px}
  #rlayer-legend{top:auto;bottom:55px;right:8px;font-size:.7rem}
  #legend{bottom:8px;right:8px;padding:7px 10px;font-size:.66rem}
  #legend .lt{display:none}
}
</style>
</head>
<body>
<div id="topbar">
  <button id="mob-sb-btn" onclick="toggleSidebar()" aria-label="Menu destinos">☰</button>
  <h1>🌍 África Meridional</h1>
  <p>24 destinos imperdíveis · Passe o mouse nos marcadores ou clique na lista</p>
  <div class="filter-row">
    <button class="filter-btn active" onclick="filterSpots('all',this)">Todos</button>
    <button class="filter-btn" onclick="filterSpots('safari',this)">🦁 Safari</button>
    <button class="filter-btn" onclick="filterSpots('mar',this)">🌊 Costa</button>
    <button class="filter-btn" onclick="filterSpots('paisagem',this)">🏔️ Paisagem</button>
    <button class="filter-btn" onclick="filterSpots('unico',this)">✨ Únicos</button>
    <button id="routes-btn" class="filter-btn" onclick="toggleRoutes()" style="border-color:#3b82f688;color:#8ac0f5">✈️ Rotas &amp; Preços</button>
  </div>
</div>
<div id="sb-overlay" onclick="toggleSidebar()"></div>
<div id="wrap">
  <div id="sidebar">
    <div id="sb-mob-close">
      <span>Destinos</span>
      <button onclick="toggleSidebar()">✕</button>
    </div>
  </div>
  <button id="sb-toggle" onclick="toggleSidebar()">‹</button>
  <div id="map-wrap">
    <div id="err">Não foi possível carregar o mapa.<br>Abra este arquivo com conexão à internet.</div>
    <div id="map"></div>
    <div id="legend"></div>
    <div id="rlayer-legend">
      <div class="rleg-ttl">Tipo de rota</div>
      <div class="rleg-row"><div class="rleg-ln" style="background:#3b82f6;border-top:2px dashed #3b82f6;height:0"></div><span>Aéreo</span></div>
      <div class="rleg-row"><div class="rleg-ln" style="background:#f59e0b"></div><span>Terrestre / ferry</span></div>
      <div class="rleg-row"><div class="rleg-ln" style="background:#a78bfa;border-top:2px dashed #a78bfa;height:0"></div><span>Ambos</span></div>
      <div style="font-size:.65rem;color:#8b949e;margin-top:7px;line-height:1.5">Toque/clique nas linhas<br>para detalhes</div>
    </div>
  </div>
</div>

let routeLayer=null,routesVisible=false;
const USD_BRL=5.75;
function brlLabel(p){
  const m=p.match(/\$(\d+)[–\-](\d+)/);
  if(!m)return '';
  const v=Math.round((+m[1]+ +m[2])/2*USD_BRL/10)*10;
  const s=v>=1000?Math.floor(v/1000)+'.'+String(v%1000).padStart(3,'0'):String(v);
  return ` (R$${s})`;
}

function routePopup(r){
  const ha=HUBS[r.a],hb=HUBS[r.b];
  const rows=r.m.map(x=>`<div class="rpop-row">
    <span class="rpop-icon">${x.i}</span>
    <div class="rpop-info">
      <span class="rpop-t">${x.t}</span><span class="rpop-p">${x.p}</span>
      <span class="rpop-c">${x.d} · ${x.c}</span>
    </div>
  </div>`).join('');
  return `<div class="rpop"><div class="rpop-name">${ha.n} ↔ ${hb.n}</div>${rows}</div>`;
}

function buildRouteLayer(){
  routeLayer=L.layerGroup();
  Object.values(HUBS).forEach(h=>{
    L.circleMarker([h.lat,h.lng],{
      radius:5,color:'#475569',weight:2,fillColor:'#f1f5f9',fillOpacity:1,zIndexOffset:500
    }).bindTooltip(h.n,{direction:'top',offset:[0,-5]}).addTo(routeLayer);
  });
  const mob=window.innerWidth<=640;
  const pw=Math.min(320,window.innerWidth-48);
  ROUTES.forEach(r=>{
    const ha=HUBS[r.a],hb=HUBS[r.b];
    const hasAir=r.m.some(x=>x.i==='✈️');
    const hasGnd=r.m.some(x=>x.i!=='✈️');
    const color=hasAir&&hasGnd?'#a78bfa':hasAir?'#3b82f6':'#f59e0b';
    const dash=hasGnd&&!hasAir?null:'6,4';
    const w=mob?3.5:2.5;
    const line=L.polyline([[ha.lat,ha.lng],[hb.lat,hb.lng]],
      {color,weight:w,opacity:.82,dashArray:dash})
      .bindPopup(routePopup(r),{maxWidth:pw,className:'dark-popup'})
      .addTo(routeLayer);
    const air=r.m.find(x=>x.i==='✈️');
    const gnd=r.m.find(x=>x.i!=='✈️');
    const ttLines=[];
    if(air)ttLines.push(`✈ ${air.t}${brlLabel(air.p)}`);
    if(gnd)ttLines.push(`${gnd.i} ${gnd.t}`);
    line.bindTooltip(ttLines.join('<br>'),{sticky:true,className:'dark-tt',offset:[0,-6]});
    line.on('mouseover',function(){this.setStyle({weight:w+1.5,opacity:1});});
    line.on('mouseout',function(){this.setStyle({weight:w,opacity:.82});});
  });
}

window.toggleRoutes=function(){
  routesVisible=!routesVisible;
  const btn=document.getElementById('routes-btn');
  const leg=document.getElementById('rlayer-legend');
  if(routesVisible){
    if(!routeLayer)buildRouteLayer();
    routeLayer.addTo(map);
    btn.classList.add('active');
    leg.classList.add('show');
  }else{
    if(routeLayer)map.removeLayer(routeLayer);
    btn.classList.remove('active');
    leg.classList.remove('show');
  }
};

window.toggleSidebar=function(){
  const sb=document.getElementById('sidebar');
  const toggle=document.getElementById('sb-toggle');
  const overlay=document.getElementById('sb-overlay');
  if(window.innerWidth<=640){
    const open=sb.classList.toggle('mobile-open');
    overlay.classList.toggle('show',open);
  }else{
    const collapsed=sb.classList.toggle('collapsed');
    if(toggle)toggle.textContent=collapsed?'›':'‹';
    setTimeout(()=>map&&map.invalidateSize(),260);
  }
};

let map,allMarkers=[];

const countryCenter={
  "Namíbia":[-22,17],"Botswana":[-21,24],"Zimbabwe":[-19,29],
  "Zâmbia":[-14,28],"África do Sul":[-29,25],"Moçambique":[-18,35],

};

function makeIcon(s){
  const ci=CTRY[s.c];
  const fbId='mfb_'+s.name.replace(/\W/g,'_');
  const html=`<div class="mwrap" style="--mc:${ci.color}">
    <div class="mthumb">
      <img src="${s.photo}" alt="${s.name}" loading="lazy"
        onerror="this.style.display='none';this.nextElementSibling.style.cssText='display:flex;width:100%;height:100%;align-items:center;justify-content:center;background:${ci.color}33'">
      <div style="display:none"></div>
    </div>
    <div class="mflag"><img src="https://flagcdn.com/w40/${ci.code}.png" style="width:100%;height:100%;object-fit:cover;display:block" alt=""></div>
    <div class="mcard" data-q="${s.name} ${s.c}" onclick="window.open('https://www.google.com/search?tbm=isch&q='+encodeURIComponent(this.dataset.q),'_blank')" title="Clique para ver fotos no Google">
      <img class="mcimg" src="${s.photo}" alt="${s.name}" loading="lazy"
        onerror="this.style.display='none';document.getElementById('${fbId}').style.display='flex'">
      <div class="mcfb" id="${fbId}" style="background:${ci.color}22">${flagBig(ci.code)}</div>
      <div class="mcbody">
        <div class="mcctry" style="color:${ci.color}">${flagImg(ci.code,14)}</div>
        <div class="mctitle">${s.name}</div>
        <div class="mcdesc">${s.desc}</div>
        <div class="mctags">${s.tags.map(t=>`<span class="mctag">${t}</span>`).join('')}</div>
      </div>
    </div>
  </div>`;
  return L.divIcon({className:'map-mc',html,iconSize:[25,25],iconAnchor:[12,25]});
}

function buildSidebar(){
  const sb=document.getElementById('sidebar');
  const groups={};
  SPOTS.forEach(s=>{if(!groups[s.c])groups[s.c]=[];groups[s.c].push(s);});
  Object.entries(groups).forEach(([cn,cspots])=>{
    const ci=CTRY[cn];
    const id='cg_'+cn.replace(/\W/g,'_');
    const div=document.createElement('div');
    div.innerHTML=`
      <div class="cg-header" onclick="document.getElementById('${id}').classList.toggle('open')">
        <div class="cdot" style="background:${ci.color}"></div>
        ${flagImg(ci.code,13)}
        <span class="cg-name">${cn}</span>
      </div>
      <div class="spot-list" id="${id}">
        ${cspots.map(s=>`<div class="si" onclick="flyTo(${s.lat},${s.lng})">▸ ${s.name}</div>`).join('')}
      </div>`;
    sb.appendChild(div);
  });
}

function buildLegend(){
  const lg=document.getElementById('legend');
  lg.innerHTML='<div class="lt">Países</div>'+
    Object.entries(CTRY).map(([cn,ci])=>
      `<div class="li" onclick="flyToCountry('${cn}')"><div class="ldot" style="background:${ci.color}"></div>${flagImg(ci.code,11)} ${cn}</div>`
    ).join('');
}

function buildMarkers(){
  allMarkers=[];
  SPOTS.forEach(s=>{
    const m=L.marker([s.lat,s.lng],{icon:makeIcon(s)}).addTo(map);
    m.on('mouseover',function(){
      const el=this.getElement();if(el)el.style.zIndex='10000';
    });
    m.on('mouseout',function(){
      const el=this.getElement();if(el)el.style.zIndex='';
    });
    m.on('click',function(e){
      if(window.innerWidth>640)return;
      const nt=e.originalEvent&&e.originalEvent.target;
      if(nt&&nt.closest&&nt.closest('.mcard'))return;
      const el=this.getElement();if(!el)return;
      const wrap=el.querySelector('.mwrap');if(!wrap)return;
      const wasOpen=wrap.classList.contains('open');
      document.querySelectorAll('.mwrap.open').forEach(w=>w.classList.remove('open'));
      document.querySelectorAll('.leaflet-marker-icon').forEach(x=>x.style.zIndex='');
      if(!wasOpen){wrap.classList.add('open');el.style.zIndex='10000';}
      L.DomEvent.stopPropagation(e);
    });
    allMarkers.push({marker:m,spot:s});
  });
}

window.filterSpots=function(cat,btn){
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  allMarkers.forEach(({marker,spot})=>{
    if(cat==='all'||spot.cat.includes(cat))map.addLayer(marker);
    else map.removeLayer(marker);
  });
};

window.flyTo=function(lat,lng){
  map.flyTo([lat,lng],10,{duration:1.4});
  if(window.innerWidth<=640)toggleSidebar();
};

window.flyToCountry=function(cn){
  const c=countryCenter[cn];
  if(c)map.flyTo(c,7,{duration:1.2});
};

function initMap(){
  if(typeof L==='undefined'){document.getElementById('err').style.display='flex';return;}
  map=L.map('map',{center:[-18,30],zoom:5});
  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{
    attribution:'© <a href="https://www.openstreetmap.org">OpenStreetMap</a> © <a href="https://carto.com">CARTO</a>',
    subdomains:'abcd',maxZoom:19
  }).addTo(map);
  map.on('click',function(){
    document.querySelectorAll('.mwrap.open').forEach(w=>w.classList.remove('open'));
    document.querySelectorAll('.leaflet-marker-icon').forEach(el=>el.style.zIndex='');
  });
  buildSidebar();
  buildMarkers();
  buildLegend();
  toggleRoutes();
}

if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',initMap);
else initMap();
