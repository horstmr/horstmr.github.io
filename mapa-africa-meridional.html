<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>África Meridional — 24 Destinos Imperdíveis</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0d1117;color:#e6edf3;overflow:hidden}
body{display:flex;flex-direction:column}
#topbar{background:#161b22;border-bottom:1px solid #30363d;padding:10px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0;flex-wrap:wrap}
#topbar h1{font-size:.95rem;font-weight:700;white-space:nowrap}
#topbar p{font-size:.75rem;color:#8b949e}
.filter-btn{padding:5px 12px;border-radius:20px;border:1px solid #30363d;background:transparent;color:#8b949e;cursor:pointer;font-size:.74rem;transition:all .15s}
.filter-btn.active,.filter-btn:hover{background:#2d6a4f;color:#fff;border-color:#2d6a4f}
#wrap{display:flex;flex:1;overflow:hidden}
#sidebar{width:230px;background:#161b22;border-right:1px solid #30363d;overflow-y:auto;flex-shrink:0}
.cg-header{padding:9px 13px;display:flex;align-items:center;gap:7px;cursor:pointer;transition:background .15s;position:sticky;top:0;background:#161b22;z-index:1;border-bottom:1px solid #21262d}
.cg-header:hover{background:#21262d}
.cdot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.cg-name{font-size:.8rem;font-weight:600}
.cg-flag{font-size:1.05rem}
.spot-list{display:none}
.spot-list.open{display:block}
.si{padding:6px 12px 6px 36px;font-size:.74rem;color:#8b949e;cursor:pointer;border-left:2px solid transparent;transition:all .15s}
.si:hover{color:#e6edf3;background:#21262d;border-left-color:#2d6a4f}
#map-wrap{flex:1;position:relative}
#map{width:100%;height:100%}
#err{display:none;position:absolute;inset:0;align-items:center;justify-content:center;background:#0d1117;color:#f85149;text-align:center;padding:20px;font-size:.88rem;line-height:1.7}
.map-mc{background:none!important;border:none!important;overflow:visible!important}
.mwrap{position:relative;width:50px;height:50px;cursor:pointer}
.mthumb{width:50px;height:50px;border-radius:50%;overflow:hidden;border:3px solid var(--mc,#fff);box-shadow:0 3px 10px rgba(0,0,0,.5);transition:transform .2s,box-shadow .2s;position:relative}
.mthumb img{width:100%;height:100%;object-fit:cover;display:block}
.mflag{position:absolute;bottom:2px;right:2px;width:22px;height:14px;border-radius:2px;overflow:hidden;border:1px solid rgba(255,255,255,.3);pointer-events:none;box-shadow:0 1px 4px rgba(0,0,0,.7)}
.mflag img{width:100%;height:100%;object-fit:cover;display:block}
.mcard{position:absolute;bottom:58px;left:50%;transform:translateX(-50%) scale(.85) translateY(8px);width:285px;background:#161b22;border:1px solid #30363d;border-radius:12px;overflow:hidden;opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;box-shadow:0 8px 32px rgba(0,0,0,.85);transform-origin:50% 100%;cursor:pointer}
.mcard:hover{border-color:#58a6ff}
.mwrap:hover .mcard,.mwrap.open .mcard{opacity:1;transform:translateX(-50%) scale(1) translateY(0);pointer-events:auto}
.mwrap:hover .mthumb,.mwrap.open .mthumb{transform:scale(1.15);box-shadow:0 5px 18px rgba(0,0,0,.6)}
.mcimg{width:100%;height:148px;object-fit:cover;display:block}
.mcfb{width:100%;height:148px;display:none;align-items:center;justify-content:center;font-size:2.5rem}
.mcbody{padding:10px 13px}
.mcctry{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;margin-bottom:3px}
.mctitle{font-size:.95rem;font-weight:700;color:#e6edf3;margin-bottom:5px}
.mcdesc{font-size:.75rem;color:#8b949e;line-height:1.5;margin-bottom:7px}
.mctags{display:flex;gap:4px;flex-wrap:wrap}
.mctag{font-size:.64rem;padding:2px 7px;border-radius:20px;background:#21262d;color:#8b949e;border:1px solid #30363d}
#legend{position:absolute;bottom:18px;right:14px;background:#161b22dd;border:1px solid #30363d;border-radius:10px;padding:9px 13px;z-index:1000;font-size:.72rem;backdrop-filter:blur(4px)}
#legend .lt{font-size:.68rem;color:#8b949e;margin-bottom:5px;font-weight:600;text-transform:uppercase;letter-spacing:.06em}
#legend .li{display:flex;align-items:center;gap:6px;padding:2px 0;color:#8b949e;cursor:pointer;border-radius:4px;transition:color .15s}
#legend .li:hover{color:#e6edf3}
#legend .ldot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
</style>
</head>
<body>
<div id="topbar">
  <h1>🌍 África Meridional</h1>
  <p>24 destinos imperdíveis · Passe o mouse nos marcadores ou clique na lista</p>
  <div style="display:flex;gap:6px;flex-wrap:wrap;margin-left:auto">
    <button class="filter-btn active" onclick="filterSpots('all',this)">Todos</button>
    <button class="filter-btn" onclick="filterSpots('safari',this)">🦁 Safari</button>
    <button class="filter-btn" onclick="filterSpots('mar',this)">🌊 Costa</button>
    <button class="filter-btn" onclick="filterSpots('paisagem',this)">🏔️ Paisagem</button>
    <button class="filter-btn" onclick="filterSpots('unico',this)">✨ Únicos</button>
  </div>
</div>
<div id="wrap">
  <div id="sidebar"></div>
  <div id="map-wrap">
    <div id="err">Não foi possível carregar o mapa.<br>Abra este arquivo com conexão à internet.</div>
    <div id="map"></div>
    <div id="legend"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"
  onerror="document.getElementById('err').style.display='flex'"></script>
<script>
const CTRY={
  "Namíbia":      {code:"na",color:"#E07B39"},
  "Botswana":     {code:"bw",color:"#4A90D9"},
  "Zimbabwe":     {code:"zw",color:"#2E8B57"},
  "Zâmbia":       {code:"zm",color:"#C0852A"},
  "África do Sul":{code:"za",color:"#3aaa5e"},
  "Moçambique":   {code:"mz",color:"#20B2AA"},
  "Madagascar":   {code:"mg",color:"#9B59B6"},
  "Malawi":       {code:"mw",color:"#3498DB"},
};
function flagImg(code,h){return `<img src="https://flagcdn.com/w40/${code}.png" height="${h||13}" style="border-radius:2px;vertical-align:middle" alt="">`;}
function flagBig(code){return `<img src="https://flagcdn.com/w80/${code}.png" height="36" style="border-radius:4px;opacity:.8" alt="">`;}


const SPOTS=[
  {name:"Sossusvlei",c:"Namíbia",lat:-24.74,lng:15.34,cat:["paisagem","unico"],
   photo:"https://upload.wikimedia.org/wikipedia/commons/thumb/2/22/Sossusvlei.jpg/500px-Sossusvlei.jpg",
   desc:"Dunas de areia vermelha de até 325m — as mais altas do mundo. Ao nascer do sol, o deserto vira ouro.",tags:["Dunas","Deserto","Fotografia"]},
  {name:"Etosha Pan",c:"Namíbia",lat:-18.86,lng:16.33,cat:["safari"],
   photo:"https://upload.wikimedia.org/wikipedia/commons/thumb/5/5a/Dust_Cloud_in_Etosha_National_Park.jpg/500px-Dust_Cloud_in_Etosha_National_Park.jpg",
   desc:"Salina imensa com aguadas que atraem elefantes, rinocerontes e leões. Perfeita para auto-drive.",tags:["Big 5","Auto-drive","Aguadas"]},
  {name:"Fish River Canyon",c:"Namíbia",lat:-27.58,lng:17.59,cat:["paisagem"],
   photo:"https://upload.wikimedia.org/wikipedia/commons/thumb/8/89/Fish_River_Canyon_from_Main_View_Point.jpg/500px-Fish_River_Canyon_from_Main_View_Point.jpg",
   desc:"2º maior cânion do mundo — 550m de profundidade, 160km de comprimento.",tags:["Cânion","Trekking","Geologia"]},
  {name:"Skeleton Coast",c:"Namíbia",lat:-21.0,lng:13.5,cat:["unico","paisagem"],
   photo:"https://upload.wikimedia.org/wikipedia/commons/thumb/f/f1/Namibia_Skelettk%C3%BCste-Nationalpark_Kreuzkap_06.jpg/500px-Namibia_Skelettk%C3%BCste-Nationalpark_Kreuzkap_06.jpg",
   desc:"Costa brutal com nevoeiros atlânticos, ossos de baleias e focas. Extremamente remota.",tags:["Costa","Remoto","Névoa"]},

  {name:"Delta do Okavango",c:"Botswana",lat:-19.28,lng:22.92,cat:["safari","unico"],
   photo:"https://upload.wikimedia.org/wikipedia/commons/thumb/e/e8/Okavango_Delta%2C_Botswana1.jpg/500px-Okavango_Delta%2C_Botswana1.jpg",
   desc:"Único delta interior do mundo — 15.000 km² de canais e vida selvagem. Safari em mokoro.",tags:["UNESCO","Mokoro","Big 5"]},
  {name:"Chobe",c:"Botswana",lat:-17.8,lng:24.9,cat:["safari"],
   photo:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/45/Gnus_zebras_chobe_national_park.jpg/500px-Gnus_zebras_chobe_national_park.jpg",
   desc:"Maior concentração de elefantes do planeta — 120.000 indivíduos. Safaris de barco no rio.",tags:["Elefantes","Barco","Rio"]},
  {name:"Makgadikgadi",c:"Botswana",lat:-20.8,lng:25.0,cat:["unico","paisagem"],
   photo:"https://upload.wikimedia.org/wikipedia/commons/thumb/2/29/Flamingo_migration_Makgadikgadi_Pan.jpg/500px-Flamingo_migration_Makgadikgadi_Pan.jpg",
   desc:"Salinas eternas onde o céu se reflete criando o maior espelho natural da Terra.",tags:["Salinas","Flamingos","Zebras"]},

  {name:"Cataratas Vitória",c:"Zimbabwe",lat:-17.92,lng:25.86,cat:["unico","paisagem"],
   photo:"https://upload.wikimedia.org/wikipedia/commons/thumb/d/da/Cataratas_Victoria%2C_Zambia-Zimbabue%2C_2018-07-27%2C_DD_04.jpg/500px-Cataratas_Victoria%2C_Zambia-Zimbabue%2C_2018-07-27%2C_DD_04.jpg",
   desc:"'A fumaça que troveja' — 1,7 km de largura e 108m de queda. Uma das 7 Maravilhas Naturais.",tags:["7 Maravilhas","Cachoeira","Épico"]},
  {name:"Mana Pools",c:"Zimbabwe",lat:-15.7,lng:29.4,cat:["safari","unico"],
   photo:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/45/ZmbziRvr.jpg/500px-ZmbziRvr.jpg",
   desc:"Único parque onde walking safari SEM guia é permitido. Leopardos e hipopótamos no Zambeze.",tags:["Walking Safari","UNESCO","Único"]},
  {name:"Matobo Hills",c:"Zimbabwe",lat:-20.5,lng:28.5,cat:["paisagem","unico"],
   photo:"https://upload.wikimedia.org/wikipedia/commons/thumb/5/5e/Sunrise_Matobo_Zimbabwe.jpg/500px-Sunrise_Matobo_Zimbabwe.jpg",
   desc:"Labirinto de granito com arte rupestre San de 2.000 anos e maior densidade de águias do mundo.",tags:["Granito","Arte Rupestre","Rinocerontes"]},

  {name:"South Luangwa",c:"Zâmbia",lat:-13.0,lng:31.5,cat:["safari","unico"],
   photo:"https://upload.wikimedia.org/wikipedia/commons/thumb/a/ac/Luangwa_River_crossing.jpg/500px-Luangwa_River_crossing.jpg",
   desc:"Berço do walking safari moderno — maior densidade de leopardos da África. Noites inesquecíveis.",tags:["Walking Safari","Leopardos","Pioneiro"]},
  {name:"Lower Zambezi",c:"Zâmbia",lat:-15.5,lng:29.2,cat:["safari"],
   photo:"https://upload.wikimedia.org/wikipedia/commons/thumb/e/e1/Lower_Zambezi%2C_Zambia_%282518067857%29.jpg/500px-Lower_Zambezi%2C_Zambia_%282518067857%29.jpg",
   desc:"Safari em canoa entre hipopótamos e crocodilos com elefantes na margem do Zambeze.",tags:["Canoa","Hipopótamos","Rio"]},

  {name:"Kruger NP",c:"África do Sul",lat:-23.9,lng:31.5,cat:["safari"],
   photo:"https://upload.wikimedia.org/wikipedia/commons/thumb/f/f0/Kruger_Zebra.JPG/500px-Kruger_Zebra.JPG",
   desc:"O safari mais famoso do mundo — Big 5 garantido, infraestrutura excelente. Ideal para quem começa.",tags:["Big 5","Auto-drive","Acessível"]},
  {name:"Cape Town",c:"África do Sul",lat:-33.92,lng:18.42,cat:["paisagem"],
   photo:"https://upload.wikimedia.org/wikipedia/commons/thumb/8/8d/Camps_bay_%2853460319478%29_%28cropped%29.jpg/500px-Camps_bay_%2853460319478%29_%28cropped%29.jpg",
   desc:"Table Mountain, praias de tirar o fôlego e winelands. Uma das cidades mais fotogênicas do mundo.",tags:["Cidade","Montanha","Vinhos"]},
  {name:"Drakensberg",c:"África do Sul",lat:-29.0,lng:29.5,cat:["paisagem"],
   photo:"https://upload.wikimedia.org/wikipedia/commons/thumb/2/22/South_Africa_-_Drakensberg_%2816261357780%29.jpg/500px-South_Africa_-_Drakensberg_%2816261357780%29.jpg",
   desc:"'Barreira de Lanças' — 3.400m de altitude com a maior coleção de arte rupestre San do mundo.",tags:["Montanhas","Arte San","Trekking"]},
  {name:"Garden Route",c:"África do Sul",lat:-33.9,lng:22.5,cat:["mar","paisagem"],
   photo:"https://upload.wikimedia.org/wikipedia/commons/thumb/7/78/Knysna_%28ZA%29%2C_Knysna_River%2C_East_and_West_Head_--_2024_--_2456.jpg/500px-Knysna_%28ZA%29%2C_Knysna_River%2C_East_and_West_Head_--_2024_--_2456.jpg",
   desc:"300km de costa dramática, florestas milenares, lagunas e avistamento de baleias.",tags:["Costa","Baleias","Drive"]},

  {name:"Bazaruto",c:"Moçambique",lat:-21.7,lng:35.5,cat:["mar","unico"],
   photo:"https://upload.wikimedia.org/wikipedia/commons/thumb/7/75/Bazaruto_Island_Mozambique_from_air.jpg/500px-Bazaruto_Island_Mozambique_from_air.jpg",
   desc:"Ilhas com areias brancas e águas turquesa. Dugongos, raias-manta e mergulho world-class.",tags:["Mergulho","Dugongos","Paraíso"]},
  {name:"Ilha de Moçambique",c:"Moçambique",lat:-15.04,lng:40.73,cat:["unico"],
   photo:"https://upload.wikimedia.org/wikipedia/commons/thumb/9/90/Ilha_de_Mocambique.jpg/500px-Ilha_de_Mocambique.jpg",
   desc:"Cidade UNESCO com arquitetura árabe, swahili e portuguesa em menos de 3km². Museu vivo.",tags:["UNESCO","Cultura","Histórico"]},
  {name:"Quirimbas",c:"Moçambique",lat:-11.5,lng:40.5,cat:["mar"],
   photo:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/37/Ilha_do_Ibo_-_sunset-01.jpg/500px-Ilha_do_Ibo_-_sunset-01.jpg",
   desc:"Recife de coral remoto com tubarões-baleia e manta rays. O Maldivas secreto da África.",tags:["Coral","Tubarão-baleia","Remoto"]},
  {name:"Gorongosa",c:"Moçambique",lat:-18.5,lng:34.5,cat:["safari"],
   photo:"https://upload.wikimedia.org/wikipedia/commons/thumb/b/b9/Makalali_Game_Reserve_%28ZA%29%2C_L%C3%B6we_--_2024_--_1341.jpg/500px-Makalali_Game_Reserve_%28ZA%29%2C_L%C3%B6we_--_2024_--_1341.jpg",
   desc:"A maior recuperação ecológica da história — de guerra devastada a paraíso selvagem em 20 anos.",tags:["Safari","Recuperação","Inspirador"]},

  {name:"Tsingy de Bemaraha",c:"Madagascar",lat:-18.9,lng:44.8,cat:["unico","paisagem"],
   photo:"https://upload.wikimedia.org/wikipedia/commons/thumb/2/28/Tsingy_de_Bemaraha_Strict_Nature_Reserve.jpg/500px-Tsingy_de_Bemaraha_Strict_Nature_Reserve.jpg",
   desc:"Florestas de agulhas de calcária com 100m de altura (UNESCO). Único no planeta.",tags:["UNESCO","Geologia","Único"]},
  {name:"Avenue des Baobabs",c:"Madagascar",lat:-20.25,lng:44.4,cat:["unico","paisagem"],
   photo:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/38/Adansonia_grandidieri_Pat_Hooper.jpg/500px-Adansonia_grandidieri_Pat_Hooper.jpg",
   desc:"Avenida de baobás seculares ao pôr do sol — a foto mais icônica de Madagascar.",tags:["Fotografia","Baobás","Pôr do Sol"]},
  {name:"Ranomafana",c:"Madagascar",lat:-21.2,lng:47.4,cat:["unico"],
   photo:"https://upload.wikimedia.org/wikipedia/commons/thumb/6/63/Red-bellied_Lemur_-_Ranomafana_-Madagascar_S4E8245_%2815286204795%29.jpg/500px-Red-bellied_Lemur_-_Ranomafana_-Madagascar_S4E8245_%2815286204795%29.jpg",
   desc:"Floresta nebulosa com 12 espécies de lêmures. Biodiversidade que não existe em lugar nenhum.",tags:["Lêmures","Endêmico","Floresta"]},

  {name:"Lago Malawi",c:"Malawi",lat:-12.0,lng:34.5,cat:["mar","unico"],
   photo:"https://upload.wikimedia.org/wikipedia/commons/thumb/7/74/Cape_McLear%2C_Malawi_%282498445835%29.jpg/500px-Cape_McLear%2C_Malawi_%282498445835%29.jpg",
   desc:"Mar interior com 800+ espécies endêmicas de peixe. Snorkeling como aquário natural gigante.",tags:["Lago","Snorkeling","UNESCO"]},
  {name:"Liwonde NP",c:"Malawi",lat:-15.0,lng:35.3,cat:["safari"],
   photo:"https://upload.wikimedia.org/wikipedia/commons/thumb/f/f2/Portrait_Hippopotamus_in_the_water.jpg/500px-Portrait_Hippopotamus_in_the_water.jpg",
   desc:"Safari de barco no Rio Shire entre elefantes que entram na água e hipopótamos.",tags:["Barco","Elefantes","Íntimo"]},
];

let map, allMarkers=[];

const countryCenter={
  "Namíbia":[-22,17],"Botswana":[-21,24],"Zimbabwe":[-19,29],
  "Zâmbia":[-14,28],"África do Sul":[-29,25],"Moçambique":[-18,35],
  "Madagascar":[-20,47],"Malawi":[-13,34]
};

function makeIcon(s){
  const ci=CTRY[s.c];
  const fbId='mfb_'+s.name.replace(/\W/g,'_');
  const html=`<div class="mwrap" style="--mc:${ci.color}">
    <div class="mthumb">
      <img src="${s.photo}" alt="${s.name}" loading="lazy"
        onerror="this.style.display='none';this.nextElementSibling.style.cssText='display:flex;width:100%;height:100%;align-items:center;justify-content:center;background:${ci.color}33'">
      <div style="display:none"></div>
    </div>
    <div class="mflag"><img src="https://flagcdn.com/w40/${ci.code}.png" style="width:100%;height:100%;object-fit:cover;display:block" alt=""></div>
    <div class="mcard" data-q="${s.name} ${s.c}" onclick="window.open('https://www.google.com/search?tbm=isch&q='+encodeURIComponent(this.dataset.q),'_blank')" title="Clique para ver fotos no Google">
      <img class="mcimg" src="${s.photo}" alt="${s.name}" loading="lazy"
        onerror="this.style.display='none';document.getElementById('${fbId}').style.display='flex'">
      <div class="mcfb" id="${fbId}" style="background:${ci.color}22">${flagBig(ci.code)}</div>
      <div class="mcbody">
        <div class="mcctry" style="color:${ci.color}">${flagImg(ci.code,14)}</div>
        <div class="mctitle">${s.name}</div>
        <div class="mcdesc">${s.desc}</div>
        <div class="mctags">${s.tags.map(t=>`<span class="mctag">${t}</span>`).join('')}</div>
      </div>
    </div>
  </div>`;
  return L.divIcon({className:'map-mc',html,iconSize:[50,50],iconAnchor:[25,50]});
}

function buildSidebar(){
  const sb=document.getElementById('sidebar');
  const groups={};
  SPOTS.forEach(s=>{if(!groups[s.c])groups[s.c]=[];groups[s.c].push(s);});
  Object.entries(groups).forEach(([cn,cspots])=>{
    const ci=CTRY[cn];
    const id='cg_'+cn.replace(/\W/g,'_');
    const div=document.createElement('div');
    div.innerHTML=`
      <div class="cg-header" onclick="document.getElementById('${id}').classList.toggle('open')">
        <div class="cdot" style="background:${ci.color}"></div>
        ${flagImg(ci.code,13)}
        <span class="cg-name">${cn}</span>
      </div>
      <div class="spot-list" id="${id}">
        ${cspots.map(s=>`<div class="si" onclick="flyTo(${s.lat},${s.lng},'${s.name.replace(/'/g,"\\'")}')">▸ ${s.name}</div>`).join('')}
      </div>`;
    sb.appendChild(div);
  });
}

function buildLegend(){
  const lg=document.getElementById('legend');
  lg.innerHTML='<div class="lt">Países</div>'+
    Object.entries(CTRY).map(([cn,ci])=>
      `<div class="li" onclick="flyToCountry('${cn}')"><div class="ldot" style="background:${ci.color}"></div>${flagImg(ci.code,11)} ${cn}</div>`
    ).join('');
}

function buildMarkers(){
  allMarkers=[];
  SPOTS.forEach(s=>{
    const m=L.marker([s.lat,s.lng],{icon:makeIcon(s)}).addTo(map);
    m.on('mouseover',function(){
      const el=this.getElement();if(el)el.style.zIndex='10000';
    });
    m.on('mouseout',function(){
      const el=this.getElement();if(el)el.style.zIndex='';
    });
    allMarkers.push({marker:m,spot:s});
  });
}

window.filterSpots=function(cat,btn){
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  allMarkers.forEach(({marker,spot})=>{
    if(cat==='all'||spot.cat.includes(cat))map.addLayer(marker);
    else{map.removeLayer(marker);}
  });
};

window.flyTo=function(lat,lng,name){
  map.flyTo([lat,lng],10,{duration:1.4});
};

window.flyToCountry=function(cn){
  const c=countryCenter[cn];
  if(c)map.flyTo(c,7,{duration:1.2});
};

function initMap(){
  if(typeof L==='undefined'){document.getElementById('err').style.display='flex';return;}
  map=L.map('map',{center:[-18,32],zoom:5});
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{
    attribution:'© <a href="https://www.openstreetmap.org">OpenStreetMap</a> © <a href="https://carto.com">CARTO</a>',
    subdomains:'abcd',maxZoom:19
  }).addTo(map);
  buildSidebar();
  buildMarkers();
  buildLegend();
}

if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',initMap);
else initMap();
</script>
