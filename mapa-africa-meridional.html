<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>África Meridional — 24 Destinos Imperdíveis</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Raleway:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Raleway',-apple-system,sans-serif;background:#160D04;color:#F5EDD9;overflow:hidden}
body{display:flex;flex-direction:column}
#topbar{background:#241306;border-bottom:1px solid #5C3817;padding:10px 16px;display:flex;align-items:center;gap:8px;flex-shrink:0;flex-wrap:wrap}
#topbar h1{font-family:'Cormorant Garamond',serif;font-size:1.15rem;font-weight:700;letter-spacing:.06em;white-space:nowrap;color:#F5EDD9}
#topbar p{font-size:.73rem;color:#9E7B50;letter-spacing:.02em}
#mob-sb-btn{display:none;align-items:center;justify-content:center;width:32px;height:32px;border-radius:7px;border:1px solid #5C3817;background:transparent;color:#9E7B50;cursor:pointer;font-size:1rem;flex-shrink:0;line-height:1}
#mob-sb-btn:hover{background:#3A1C08;color:#F5EDD9}
.filter-row{display:flex;gap:6px;flex-wrap:wrap;margin-left:auto;align-items:center}
.filter-btn{padding:5px 12px;border-radius:20px;border:1px solid #5C3817;background:transparent;color:#9E7B50;cursor:pointer;font-family:'Raleway',sans-serif;font-size:.73rem;letter-spacing:.02em;transition:all .15s;white-space:nowrap;flex-shrink:0}
.filter-btn.active,.filter-btn:hover{background:#7A4A1E;color:#F5EDD9;border-color:#7A4A1E}
#btn-air.active{background:#5C3A00!important;color:#F0CB7C!important;border-color:#D4A853!important}
#btn-gnd.active{background:#3D1509!important;color:#E8906A!important;border-color:#C4622D!important}
#wrap{display:flex;flex:1;overflow:hidden}
#sidebar{width:230px;background:#241306;border-right:1px solid #5C3817;overflow-y:auto;flex-shrink:0;transition:width .25s;position:relative}
#sidebar.collapsed{width:0;overflow:hidden}
#sb-toggle{width:14px;height:44px;background:#3A1C08;border:1px solid #5C3817;border-left:none;border-radius:0 7px 7px 0;cursor:pointer;color:#9E7B50;font-size:.65rem;padding:0;flex-shrink:0;align-self:center;transition:background .15s;line-height:1}
#sb-toggle:hover{background:#5C3817;color:#F5EDD9}
#sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200}
#sb-overlay.show{display:block}
#sb-mob-close{display:none;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid #3A1C08;position:sticky;top:0;background:#241306;z-index:5}
#sb-mob-close span{font-family:'Cormorant Garamond',serif;font-size:.82rem;font-weight:700;color:#9E7B50;text-transform:uppercase;letter-spacing:.1em}
#sb-mob-close button{background:none;border:none;color:#9E7B50;cursor:pointer;font-size:1rem;padding:4px;line-height:1}
#sb-mob-close button:hover{color:#F5EDD9}
.cg-header{padding:9px 13px;display:flex;align-items:center;gap:7px;cursor:pointer;transition:background .15s;position:sticky;top:0;background:#241306;z-index:1;border-bottom:1px solid #3A1C08}
.cg-header:hover{background:#3A1C08}
.cdot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.cg-name{font-family:'Cormorant Garamond',serif;font-size:.9rem;font-weight:600;letter-spacing:.04em}
.spot-list{display:none}
.spot-list.open{display:block}
.si{padding:6px 12px 6px 36px;font-size:.74rem;color:#9E7B50;cursor:pointer;border-left:2px solid transparent;transition:all .15s;font-family:'Raleway',sans-serif}
.si:hover{color:#F5EDD9;background:#3A1C08;border-left-color:#D4A853}
#map-wrap{flex:1;position:relative;min-width:0}
#map{width:100%;height:100%}
#err{display:none;position:absolute;inset:0;align-items:center;justify-content:center;background:#160D04;color:#C4622D;text-align:center;padding:20px;font-size:.88rem;line-height:1.7}
.map-mc{background:none!important;border:none!important;overflow:visible!important}
.mwrap{position:relative;width:50px;height:50px;cursor:pointer}
.mthumb{width:50px;height:50px;border-radius:50%;overflow:hidden;border:3px solid var(--mc,#D4A853);box-shadow:0 3px 14px rgba(0,0,0,.6);transition:transform .2s,box-shadow .2s;position:relative}
.mthumb img{width:100%;height:100%;object-fit:cover;display:block}
.mflag{position:absolute;bottom:2px;right:2px;width:18px;height:12px;border-radius:2px;overflow:hidden;border:1px solid rgba(255,255,255,.4);pointer-events:none;box-shadow:0 1px 4px rgba(0,0,0,.7)}
.mflag img{width:100%;height:100%;object-fit:cover;display:block}
.mwrap:hover .mthumb,.mwrap.open .mthumb{transform:scale(2);box-shadow:0 8px 28px rgba(0,0,0,.8)}
#gcard{position:fixed;bottom:0;left:0;right:0;z-index:9999;background:#FDF5E8;border-radius:22px 22px 0 0;box-shadow:0 -6px 36px rgba(0,0,0,.3);transform:translateY(110%);transition:transform .35s cubic-bezier(.4,0,.2,1);max-height:82vh;display:flex;flex-direction:column;overflow:hidden}
#gcard.open{transform:translateY(0)}
.gc-handle{width:40px;height:4px;background:#C4A882;border-radius:2px;margin:10px auto 0;flex-shrink:0;cursor:grab}
.gc-gal{position:relative;height:360px;flex-shrink:0;overflow:hidden;background:#EDE0C8}
.gc-scroll{display:flex;height:100%;overflow-x:scroll;scroll-snap-type:x mandatory;scroll-behavior:smooth;scrollbar-width:none}
.gc-scroll::-webkit-scrollbar{display:none}
.gc-slide{min-width:100%;height:100%;scroll-snap-align:start;flex-shrink:0}
.gc-slide img{width:100%;height:100%;object-fit:cover;display:block}
.gc-dots{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);display:flex;gap:4px;align-items:center}
.gc-dot{height:6px;width:6px;border-radius:3px;background:rgba(255,255,255,.5);transition:all .25s}
.gc-dot.act{width:20px;background:#fff}
.gc-close{position:absolute;top:10px;right:10px;width:30px;height:30px;border-radius:50%;background:rgba(253,245,232,.92);border:none;font-size:.7rem;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#2C1810;box-shadow:0 1px 8px rgba(0,0,0,.28)}
.gc-prev,.gc-next{position:absolute;top:50%;transform:translateY(-50%);width:34px;height:34px;border-radius:50%;background:rgba(253,245,232,.92);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#2C1810;box-shadow:0 2px 10px rgba(0,0,0,.3);font-size:.82rem;font-weight:700;z-index:2;opacity:0;transition:opacity .2s}
.gc-gal:hover .gc-prev,.gc-gal:hover .gc-next{opacity:1}
.gc-prev{left:10px}.gc-next{right:10px}
.gc-body{padding:18px 20px 36px;overflow-y:auto;-webkit-overflow-scrolling:touch;flex:1;background:#FDF5E8}
.gc-loc{font-family:'Raleway',sans-serif;font-size:.68rem;color:#7A5830;font-weight:600;letter-spacing:.1em;text-transform:uppercase;display:flex;align-items:center;gap:5px;margin-bottom:6px}
.gc-title{font-family:'Cormorant Garamond',serif;font-size:1.75rem;font-weight:700;color:#2C1810;line-height:1.15;margin-bottom:8px}
.gc-desc{font-family:'Raleway',sans-serif;font-size:.82rem;color:#4A3020;line-height:1.65;margin-bottom:14px}
.gc-tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:14px}
.gc-tag{font-family:'Raleway',sans-serif;font-size:.66rem;padding:3px 11px;border-radius:20px;background:#F5EDD9;color:#5C3A1A;border:1px solid #D4B896;letter-spacing:.03em}
.gc-sep{height:1px;background:#DDD0B8;margin-bottom:14px}
.gc-gbtn{display:block;width:100%;padding:14px;background:#C4622D;color:#FDF5E8;border:none;border-radius:10px;font-family:'Cormorant Garamond',serif;font-size:1.05rem;font-weight:700;cursor:pointer;text-align:center;letter-spacing:.06em}
.gc-gbtn:hover{background:#A04018}
#legend-wrap{position:absolute;bottom:18px;left:0;z-index:2000;display:flex;align-items:stretch}
#legend-wrap.leg-col #legend{display:none}
#legend{background:#241306ee;border:1px solid #5C3817;border-right:none;border-radius:6px 0 0 6px;padding:9px 13px;font-size:.72rem;backdrop-filter:blur(4px);max-height:55vh;overflow-y:auto}
#legend .lt{font-family:'Cormorant Garamond',serif;font-size:.8rem;color:#9E7B50;margin-bottom:5px;font-weight:600;text-transform:uppercase;letter-spacing:.08em}
#legend .li{display:flex;align-items:center;gap:6px;padding:2px 0;color:#9E7B50;cursor:pointer;border-radius:4px;transition:color .15s}
#legend .li:hover{color:#F5EDD9}
#legend .ldot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
#leg-tab{width:18px;background:#3A1C08;border:1px solid #5C3817;border-left:none;border-radius:0 6px 6px 0;color:#9E7B50;cursor:pointer;font-size:.6rem;padding:0;flex-shrink:0;display:flex;align-items:center;justify-content:center}
#leg-tab:hover{background:#5C3817;color:#F5EDD9}
.rpop{min-width:220px;font-family:'Raleway',sans-serif}
.rpop-name{font-family:'Cormorant Garamond',serif;font-size:1rem;font-weight:700;color:#F5EDD9;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid #5C3817;letter-spacing:.04em}
.rpop-row{display:flex;align-items:flex-start;gap:8px;padding:6px 0;font-size:.76rem;border-top:1px solid #3A1C08}
.rpop-icon{font-size:.9rem;flex-shrink:0;width:22px;text-align:center;margin-top:1px}
.rpop-info{flex:1;min-width:0}
.rpop-t{color:#F5EDD9;font-weight:700}
.rpop-p{color:#D4A853;font-weight:600;margin:0 5px}
.rpop-c{color:#9E7B50;font-size:.68rem;display:block;margin-top:2px}
.leaflet-popup-pane{z-index:20000!important}
.dark-popup .leaflet-popup-content-wrapper{background:#241306!important;border:1px solid #5C3817!important;border-radius:10px!important;color:#F5EDD9!important;box-shadow:0 8px 28px rgba(0,0,0,.8)!important}
.dark-popup .leaflet-popup-content{margin:10px 13px!important}
.dark-popup .leaflet-popup-tip{background:#241306!important}
.dark-popup .leaflet-popup-close-button{color:#9E7B50!important;font-size:16px!important;top:6px!important;right:8px!important}
#rlayer-wrap{position:absolute;top:56px;right:0;z-index:1900;display:none;flex-direction:row;align-items:stretch;pointer-events:none}
#rlayer-wrap.routes-on{display:flex}
#rlayer-wrap.leg-col #rlayer-legend{display:none}
#rl-tab{width:18px;background:#3A1C08;border:1px solid #5C3817;border-right:none;border-radius:6px 0 0 6px;color:#9E7B50;cursor:pointer;font-size:.6rem;padding:0;flex-shrink:0;display:flex;align-items:center;justify-content:center;pointer-events:auto}
#rl-tab:hover{background:#5C3817;color:#F5EDD9}
#rlayer-legend{background:#241306ee;border:1px solid #5C3817;border-left:none;border-radius:0 6px 6px 0;padding:10px 14px;font-size:.72rem;backdrop-filter:blur(4px);pointer-events:none}
.rleg-ttl{font-family:'Cormorant Garamond',serif;font-size:.85rem;color:#9E7B50;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:7px}
.rleg-row{display:flex;align-items:center;gap:8px;padding:2px 0;color:#C4A882}
.rleg-ln{width:26px;height:3px;flex-shrink:0;border-radius:2px}
.dark-tt{background:rgba(22,13,4,.96)!important;border:1px solid #5C3817!important;border-radius:5px!important;color:#F5EDD9!important;font-family:'Raleway',sans-serif!important;font-size:.73rem!important;font-weight:600!important;box-shadow:0 3px 10px rgba(0,0,0,.7)!important;padding:5px 10px!important;line-height:1.6!important}
.dark-tt::before{display:none!important}
#price-filter{display:none;align-items:center;gap:5px;padding:0 4px;border-left:1px solid #5C3817;margin-left:4px}
#price-filter.show{display:flex}
#price-slider{-webkit-appearance:none;appearance:none;width:88px;height:3px;border-radius:2px;background:#5C3817;outline:none;cursor:pointer}
#price-slider::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:#D4A853;cursor:pointer;border:2px solid #241306;box-shadow:0 1px 4px rgba(0,0,0,.5)}
#price-slider::-moz-range-thumb{width:14px;height:14px;border-radius:50%;background:#D4A853;cursor:pointer;border:2px solid #241306;box-shadow:0 1px 4px rgba(0,0,0,.5)}
#price-label{font-family:'Raleway',sans-serif;font-size:.67rem;color:#D4A853;font-weight:700;white-space:nowrap;min-width:42px;text-align:right}
@media(max-width:640px){
  #topbar p{display:none}
  #topbar{padding:8px 10px;gap:6px;flex-wrap:wrap}
  .filter-row{margin-left:0;width:100%;flex-wrap:nowrap;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
  .filter-row::-webkit-scrollbar{display:none}
  #sidebar{position:fixed!important;left:0;top:0;bottom:0;z-index:300;width:270px!important;transform:translateX(-100%);transition:transform .25s;overflow-y:auto}
  #sidebar.mobile-open{transform:translateX(0)}
  #sidebar.collapsed{width:270px!important;transform:translateX(-100%)}
  #sb-toggle{display:none}
  #sb-overlay.show{display:block}
  #sb-mob-close{display:flex}
  .cg-header{top:44px}
  #legend-wrap{position:fixed;bottom:8px;left:0}
  #legend{padding:7px 10px;font-size:.66rem}
  #legend .lt{display:none}
  #rlayer-wrap{position:fixed;top:auto;bottom:55px;right:0}
  #rlayer-legend{font-size:.7rem}
  .gc-gal{height:300px}
}
</style>
</head>
<body>
<div id="topbar">
  <h1>🌍 África Meridional</h1>
  <p>24 destinos imperdíveis · Passe o mouse nos marcadores ou clique na lista</p>
  <div class="filter-row">
    <button class="filter-btn active" onclick="filterSpots('all',this)">Todos</button>
    <button class="filter-btn" onclick="filterSpots('safari',this)">🦁 Safari</button>
    <button class="filter-btn" onclick="filterSpots('mar',this)">🌊 Costa</button>
    <button class="filter-btn" onclick="filterSpots('paisagem',this)">🏔️ Paisagem</button>
    <button class="filter-btn" onclick="filterSpots('unico',this)">✨ Únicos</button>
    <button id="btn-air" class="filter-btn" onclick="toggleAir()" style="border-color:#D4A85388;color:#D4A853">✈️ Aéreo</button>
    <button id="btn-gnd" class="filter-btn" onclick="toggleGnd()" style="border-color:#C4622D88;color:#C4622D">🚗 Terrestre</button>
    <div id="price-filter">
      <span style="font-size:.75rem;color:#94a3b8">💰</span>
      <input type="range" id="price-slider" min="0" max="700" value="700" step="25" oninput="onPriceSlide(this.value)">
      <span id="price-label">Todos</span>
    </div>
  </div>
</div>
<div id="sb-overlay" onclick="toggleSidebar()"></div>
<div id="wrap">
  <div id="sidebar">
    <div id="sb-mob-close">
      <span>Destinos</span>
      <button onclick="toggleSidebar()">✕</button>
    </div>
  </div>
  <button id="sb-toggle" onclick="toggleSidebar()">‹</button>
  <div id="map-wrap">
    <div id="err">Não foi possível carregar o mapa.<br>Abra este arquivo com conexão à internet.</div>
    <div id="map"></div>
    <div id="legend-wrap">
      <div id="legend"></div>
      <button id="leg-tab" onclick="toggleLeg()">‹</button>
    </div>
    <div id="rlayer-wrap">
      <button id="rl-tab" onclick="toggleRleg()">›</button>
      <div id="rlayer-legend">
        <div class="rleg-ttl">Rotas</div>
        <div class="rleg-row"><div class="rleg-ln" style="border-top:2px dashed #D4A853;height:0"></div><span style="color:#F0CB7C">Aéreo</span></div>
        <div class="rleg-row"><div class="rleg-ln" style="background:#C4622D"></div><span style="color:#E8906A">Terrestre</span></div>
        <div style="font-size:.65rem;color:#9E7B50;margin-top:7px;line-height:1.5">Clique nas linhas<br>para detalhes</div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"
  onerror="document.getElementById('err').style.display='flex'"></script>
<script>
const CTRY={
  "Namíbia":      {code:"na",color:"#E07B39"},
  "Botswana":     {code:"bw",color:"#4A90D9"},
  "Zimbabwe":     {code:"zw",color:"#2E8B57"},
  "Zâmbia":       {code:"zm",color:"#C0852A"},
  "África do Sul":{code:"za",color:"#3aaa5e"},
  "Moçambique":   {code:"mz",color:"#20B2AA"},
  "Madagascar":   {code:"mg",color:"#9B59B6"},
  "Malawi":       {code:"mw",color:"#3498DB"},
};
function flagImg(code,h){return `<img src="https://flagcdn.com/w40/${code}.png" height="${h||13}" style="border-radius:2px;vertical-align:middle" alt="">`;}
function flagBig(code){return `<img src="https://flagcdn.com/w80/${code}.png" height="36" style="border-radius:4px;opacity:.8" alt="">`;}

const SPOTS=[
  {name:"Sossusvlei",c:"Namíbia",lat:-24.74,lng:15.34,cat:["paisagem","unico"],
   photos:["https://upload.wikimedia.org/wikipedia/commons/thumb/2/22/Sossusvlei.jpg/1280px-Sossusvlei.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/3/3a/Sossusvlei_aus_der_Vogelperspektive.jpg/1280px-Sossusvlei_aus_der_Vogelperspektive.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/3/3d/Sossusvlei_south_view.jpg/1280px-Sossusvlei_south_view.jpg"],
   desc:"Dunas de areia vermelha de até 325m — as mais altas do mundo. Ao nascer do sol, o deserto vira ouro.",tags:["Dunas","Deserto","Fotografia"]},
  {name:"Etosha Pan",c:"Namíbia",lat:-18.86,lng:16.33,cat:["safari"],
   photos:["https://upload.wikimedia.org/wikipedia/commons/thumb/6/60/Dry_Etosha_Pan.jpg/1280px-Dry_Etosha_Pan.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/5/5a/Dust_Cloud_in_Etosha_National_Park.jpg/1280px-Dust_Cloud_in_Etosha_National_Park.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/0/01/Elephants_Jakkalswater.jpg/1280px-Elephants_Jakkalswater.jpg"],
   desc:"Salina imensa com aguadas que atraem elefantes, rinocerontes e leões. Perfeita para auto-drive.",tags:["Big 5","Auto-drive","Aguadas"]},
  {name:"Fish River Canyon",c:"Namíbia",lat:-27.58,lng:17.59,cat:["paisagem"],
   photos:["https://upload.wikimedia.org/wikipedia/commons/thumb/8/89/Fish_River_Canyon_from_Main_View_Point.jpg/1280px-Fish_River_Canyon_from_Main_View_Point.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/4/40/Fish_River_Canyon_Bird%27s_eye_view.jpg/1280px-Fish_River_Canyon_Bird%27s_eye_view.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/f/f3/Fish_River_Canyon_-_Sand_at_descend.jpg/1280px-Fish_River_Canyon_-_Sand_at_descend.jpg"],
   desc:"2º maior cânion do mundo — 550m de profundidade, 160km de comprimento.",tags:["Cânion","Trekking","Geologia"]},
  {name:"Skeleton Coast",c:"Namíbia",lat:-21.0,lng:13.5,cat:["unico","paisagem"],
   photos:["https://upload.wikimedia.org/wikipedia/commons/thumb/7/75/Schiffswrack_Zeila%2C_Namibia_2014.jpg/1280px-Schiffswrack_Zeila%2C_Namibia_2014.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/7/7f/Seals_on_the_Skeleton_Coast_%285832914651%29.jpg/1280px-Seals_on_the_Skeleton_Coast_%285832914651%29.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/f/f1/Namibia_Skelettk%C3%BCste-Nationalpark_Kreuzkap_06.jpg/1280px-Namibia_Skelettk%C3%BCste-Nationalpark_Kreuzkap_06.jpg"],
   desc:"Costa brutal com nevoeiros atlânticos, ossos de baleias e focas. Extremamente remota.",tags:["Costa","Remoto","Névoa"]},

  {name:"Delta do Okavango",c:"Botswana",lat:-19.28,lng:22.92,cat:["safari","unico"],
   photos:["https://upload.wikimedia.org/wikipedia/commons/thumb/4/4a/Okavango_Delta.jpg/1280px-Okavango_Delta.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/8/83/Shinde_Lagoon%2C_Okavango_Delta%2C_Botswana.jpg/1280px-Shinde_Lagoon%2C_Okavango_Delta%2C_Botswana.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/e/e8/Okavango_Delta%2C_Botswana1.jpg/1280px-Okavango_Delta%2C_Botswana1.jpg"],

  {a:"dur",b:"els",m:[{i:"✈️",d:"Voo",t:"45min",p:"$50–90",c:"Airlink · CemAir"},{i:"🚗",d:"Carro",t:"4h30m",p:"—",c:"N2"}]},
  {a:"plz",b:"els",m:[{i:"🚗",d:"Carro",t:"2h30m",p:"—",c:"N2 pela costa"}]},

let airLayer=null,gndLayer=null,hubLayer=null,airVisible=false,gndVisible=false;
let routeData=[],priceMax=700;
const USD_BRL=5.75;

function avgPrice(p){
  if(!p||p==='—')return 0;
  const m=p.match(/\$(\d+)[–\-](\d+)/);
  if(!m)return 0;
  return(+m[1]+ +m[2])/2;
}

function brlLabel(p){
  const m=p.match(/\$(\d+)[–\-](\d+)/);
  if(!m)return '';
  const v=Math.round((+m[1]+ +m[2])/2*USD_BRL/10)*10;
  const s=v>=1000?Math.floor(v/1000)+'.'+String(v%1000).padStart(3,'0'):String(v);
  return ` (R$${s})`;
}

function setLineVis(line,vis){
  line.setStyle({opacity:vis?.85:0});
  const el=line.getElement&&line.getElement();
  if(el)el.style.pointerEvents=vis?'':'none';
}

function applyPriceFilter(){
  routeData.forEach(rd=>{
    const showA=rd.airMinP<=priceMax;
    const showG=rd.gndMinP<=priceMax;
    rd.airLines.forEach(l=>setLineVis(l,showA));
    rd.airHits.forEach(l=>setLineVis(l,showA));
    rd.gndLines.forEach(l=>setLineVis(l,showG));
    rd.gndHits.forEach(l=>setLineVis(l,showG));
  });
}

window.onPriceSlide=function(v){
  priceMax=+v;
  document.getElementById('price-label').textContent=+v>=700?'Todos':'≤ $'+v;
  if(routeData.length)applyPriceFilter();
};

function routePopup(r){
  const ha=HUBS[r.a],hb=HUBS[r.b];
  const rows=r.m.map(x=>`<div class="rpop-row">
    <span class="rpop-icon">${x.i}</span>
    <div class="rpop-info">
      <span class="rpop-t">${x.t}</span><span class="rpop-p">${x.p}</span>
      <span class="rpop-c">${x.d} · ${x.c}</span>
    </div>
  </div>`).join('');
  return `<div class="rpop"><div class="rpop-name">${ha.n} ↔ ${hb.n}</div>${rows}</div>`;
}

function curved(a,b,dir,n=24){
  const mlat=(a[0]+b[0])/2,mlng=(a[1]+b[1])/2;
  const dlat=b[0]-a[0],dlng=b[1]-a[1];
  const len=Math.sqrt(dlat*dlat+dlng*dlng);
  if(len<0.001)return [a,b];
  const k=len*0.26*dir;
  const cx=mlat-dlng/len*k,cy=mlng+dlat/len*k;
  const pts=[];
  for(let i=0;i<=n;i++){const t=i/n;pts.push([(1-t)*(1-t)*a[0]+2*(1-t)*t*cx+t*t*b[0],(1-t)*(1-t)*a[1]+2*(1-t)*t*cy+t*t*b[1]]);}
  return pts;
}

function buildRouteLayers(){
  routeData=[];
  hubLayer=L.layerGroup();
  Object.values(HUBS).forEach(h=>{
    L.circleMarker([h.lat,h.lng],{
      radius:4,color:'#9E7B50',weight:1.5,fillColor:'#241306',fillOpacity:1,zIndexOffset:500
    }).bindTooltip(h.n,{direction:'top',offset:[0,-5]}).addTo(hubLayer);
  });
  airLayer=L.layerGroup();
  gndLayer=L.layerGroup();
  const mob=window.innerWidth<=640;
  const pw=Math.min(320,window.innerWidth-48);
  const w=mob?1.5:1;
  ROUTES.forEach(r=>{
    const ha=HUBS[r.a],hb=HUBS[r.b];
    if(!ha||!hb)return;
    const hasAir=r.m.some(x=>x.i==='✈️');
    const hasGnd=r.m.some(x=>x.i!=='✈️');
    const hasBoth=hasAir&&hasGnd;
    const popup=routePopup(r);
    const popOpts={maxWidth:pw,className:'dark-popup',keepInView:true};
    const air=r.m.find(x=>x.i==='✈️');
    const gnd=r.m.find(x=>x.i!=='✈️');
    const ttLines=[];
    if(air)ttLines.push(`✈ ${air.t}${brlLabel(air.p)}`);
    if(gnd)ttLines.push(`${gnd.i} ${gnd.t}`);
    const tt=ttLines.join('<br>');
    const airModes=r.m.filter(x=>x.i==='✈️');
    const gndModes=r.m.filter(x=>x.i!=='✈️');
    const rd={
      airMinP:airModes.length?Math.min(...airModes.map(x=>avgPrice(x.p))):Infinity,
      gndMinP:gndModes.length?Math.min(...gndModes.map(x=>avgPrice(x.p))):Infinity,
      airLines:[],gndLines:[],airHits:[],gndHits:[]
    };
    function makeLine(layer,color,dashArray,dir,isAir){
      const pts=curved([ha.lat,ha.lng],[hb.lat,hb.lng],dir);
      const line=L.polyline(pts,{color,weight:w,opacity:.85,dashArray})
        .bindPopup(popup,popOpts).addTo(layer);
      line.bindTooltip(tt,{sticky:true,className:'dark-tt',offset:[0,-6]});
      if(isAir)rd.airLines.push(line);else rd.gndLines.push(line);
      if(mob){
        const hit=L.polyline(pts,{color:'transparent',weight:18,opacity:.001}).addTo(layer);
        hit.on('click',function(e){line.openPopup(e.latlng);if(e.originalEvent)e.originalEvent.stopPropagation();});
        line.on('click',function(e){this.openPopup(e.latlng);if(e.originalEvent)e.originalEvent.stopPropagation();});
        if(isAir)rd.airHits.push(hit);else rd.gndHits.push(hit);
      }else{
        line.on('mouseover',function(){this.setStyle({weight:w+1.5,opacity:1});});
        line.on('mouseout',function(){this.setStyle({weight:w,opacity:.85});});
      }
    }
    if(hasAir)makeLine(airLayer,'#D4A853','5,4',hasBoth?0.5:0.3,true);
    if(hasGnd)makeLine(gndLayer,'#C4622D',null,hasBoth?-0.5:-0.3,false);
    routeData.push(rd);
  });
}

function updateRouteVis(){
  const on=airVisible||gndVisible;
  if(on&&hubLayer&&!map.hasLayer(hubLayer))hubLayer.addTo(map);
  else if(!on&&hubLayer)map.removeLayer(hubLayer);
  document.getElementById('rlayer-wrap').classList.toggle('routes-on',on);
  document.getElementById('price-filter').classList.toggle('show',on);
  if(on&&routeData.length)applyPriceFilter();
}
window.toggleAir=function(){
  if(!airLayer)buildRouteLayers();
  airVisible=!airVisible;
  if(airVisible)airLayer.addTo(map);
  else map.removeLayer(airLayer);
  document.getElementById('btn-air').classList.toggle('active',airVisible);
  updateRouteVis();
};
window.toggleGnd=function(){
  if(!gndLayer)buildRouteLayers();
  gndVisible=!gndVisible;
  if(gndVisible)gndLayer.addTo(map);
  else map.removeLayer(gndLayer);
  document.getElementById('btn-gnd').classList.toggle('active',gndVisible);
  updateRouteVis();
};
window.toggleRleg=function(){
  const w=document.getElementById('rlayer-wrap');
  const t=document.getElementById('rl-tab');
  w.classList.toggle('leg-col');
  t.textContent=w.classList.contains('leg-col')?'‹':'›';
};
window.toggleLeg=function(){
  const w=document.getElementById('legend-wrap');
  const t=document.getElementById('leg-tab');
  w.classList.toggle('leg-col');
  t.textContent=w.classList.contains('leg-col')?'›':'‹';
};

window.toggleSidebar=function(){
  const sb=document.getElementById('sidebar');
  const toggle=document.getElementById('sb-toggle');
  const overlay=document.getElementById('sb-overlay');
  if(window.innerWidth<=640){
    const open=sb.classList.toggle('mobile-open');
    overlay.classList.toggle('show',open);
  }else{
    const collapsed=sb.classList.toggle('collapsed');
    if(toggle)toggle.textContent=collapsed?'›':'‹';
    setTimeout(()=>map&&map.invalidateSize(),260);
  }
};

let map,allMarkers=[];

const countryCenter={
  "Namíbia":[-22,17],"Botswana":[-21,24],"Zimbabwe":[-19,29],
  "Zâmbia":[-14,28],"África do Sul":[-29,25],"Moçambique":[-18,35],
  "Madagascar":[-20,47],"Malawi":[-13,34]
};

function makeIcon(s){
  const ci=CTRY[s.c];
  const photos=s.photos||[s.photo];
  const html=`<div class="mwrap" style="--mc:${ci.color}">
    <div class="mthumb">
      <img src="${photos[0]}" alt="${s.name}" loading="lazy"
        onerror="this.style.display='none';this.nextElementSibling.style.cssText='display:flex;width:100%;height:100%;align-items:center;justify-content:center;background:${ci.color}33'">
      <div style="display:none"></div>
    </div>
    <div class="mflag"><img src="https://flagcdn.com/w40/${ci.code}.png" style="width:100%;height:100%;object-fit:cover;display:block" alt=""></div>
  </div>`;
  return L.divIcon({className:'map-mc',html,iconSize:[50,50],iconAnchor:[25,50]});
}

window.showCard=function(s){
  const ci=CTRY[s.c];
  const photos=s.photos||[s.photo];
  const sc=document.getElementById('gc_s');
  sc.innerHTML=photos.map(u=>`<div class="gc-slide" style="background:${ci.color}11"><img src="${u}" loading="lazy" onerror="this.style.display='none'"></div>`).join('');
  sc.scrollLeft=0;
  const dd=document.getElementById('gc_d');
  if(photos.length>1){
    dd.innerHTML=photos.map((_,i)=>`<div class="gc-dot${i===0?' act':''}"></div>`).join('');
    dd.style.display='flex';
  }else{dd.style.display='none';}
  document.getElementById('gc_loc').innerHTML=flagImg(ci.code,12)+' <span>'+s.c+'</span>';
  document.getElementById('gc_ttl').textContent=s.name;
  document.getElementById('gc_dsc').textContent=s.desc;
  document.getElementById('gc_tgs').innerHTML=s.tags.map(t=>`<span class="gc-tag">${t}</span>`).join('');
  document.getElementById('gc_btn').dataset.q=s.name+' '+s.c;
  document.getElementById('gcard').classList.add('open');
};

window.closeCard=function(){
  document.getElementById('gcard').classList.remove('open');
  document.querySelectorAll('.mwrap.open').forEach(w=>w.classList.remove('open'));
};

window.gcNav=function(dir){
  const sc=document.getElementById('gc_s');
  if(sc)sc.scrollBy({left:dir*sc.offsetWidth,behavior:'smooth'});
};
window.gcDots=function(el){
  const idx=Math.round(el.scrollLeft/el.offsetWidth);
  document.querySelectorAll('#gc_d .gc-dot').forEach((d,i)=>d.classList.toggle('act',i===idx));
};

function buildSidebar(){
  const sb=document.getElementById('sidebar');
  const groups={};
  SPOTS.forEach(s=>{if(!groups[s.c])groups[s.c]=[];groups[s.c].push(s);});
  Object.entries(groups).forEach(([cn,cspots])=>{
    const ci=CTRY[cn];
    const id='cg_'+cn.replace(/\W/g,'_');
    const div=document.createElement('div');
    div.innerHTML=`
      <div class="cg-header" onclick="document.getElementById('${id}').classList.toggle('open')">
        <div class="cdot" style="background:${ci.color}"></div>
        ${flagImg(ci.code,13)}
        <span class="cg-name">${cn}</span>
      </div>
      <div class="spot-list" id="${id}">
        ${cspots.map(s=>`<div class="si" onclick="flyTo(${s.lat},${s.lng})">▸ ${s.name}</div>`).join('')}
      </div>`;
    sb.appendChild(div);
  });
}

function buildLegend(){
  const lg=document.getElementById('legend');
  lg.innerHTML='<div class="lt">Países</div>'+
    Object.entries(CTRY).map(([cn,ci])=>
      `<div class="li" onclick="flyToCountry('${cn}')"><div class="ldot" style="background:${ci.color}"></div>${flagImg(ci.code,11)} ${cn}</div>`
    ).join('');
}

function buildMarkers(){
  allMarkers=[];
  SPOTS.forEach(s=>{
    const m=L.marker([s.lat,s.lng],{icon:makeIcon(s)}).addTo(map);
    m.bindTooltip(s.name,{direction:'top',className:'dark-tt',offset:[0,-82],sticky:false});
    m.on('mouseover',function(){
      const el=this.getElement();if(el)el.style.zIndex='10000';
    });
    m.on('mouseout',function(){
      const el=this.getElement();if(el)el.style.zIndex='';
    });
    m.on('click',function(e){
      const el=this.getElement();
      document.querySelectorAll('.mwrap.open').forEach(w=>w.classList.remove('open'));
      document.querySelectorAll('.leaflet-marker-icon').forEach(x=>x.style.zIndex='');
      if(el){
        const wrap=el.querySelector('.mwrap');
        if(wrap)wrap.classList.add('open');
        el.style.zIndex='10000';
      }
      showCard(s);
      L.DomEvent.stopPropagation(e);
    });
    allMarkers.push({marker:m,spot:s});
  });
}

window.filterSpots=function(cat,btn){
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  allMarkers.forEach(({marker,spot})=>{
    if(cat==='all'||spot.cat.includes(cat))map.addLayer(marker);
    else map.removeLayer(marker);
  });
};

window.flyTo=function(lat,lng){
  map.flyTo([lat,lng],10,{duration:1.4});
  if(window.innerWidth<=640)toggleSidebar();
};

window.flyToCountry=function(cn){
  const c=countryCenter[cn];
  if(c)map.flyTo(c,7,{duration:1.2});
};

function initMap(){
  if(typeof L==='undefined'){document.getElementById('err').style.display='flex';return;}
  map=L.map('map',{center:[-18,30],zoom:5});
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{
    attribution:'© <a href="https://www.openstreetmap.org">OpenStreetMap</a> © <a href="https://carto.com">CARTO</a>',
    subdomains:'abcd',maxZoom:19
  }).addTo(map);
  map.on('click',function(){ closeCard(); });
  map.on('popupopen',function(){
    closeCard();
    document.querySelectorAll('.mwrap.open').forEach(w=>w.classList.remove('open'));
    document.querySelectorAll('.leaflet-marker-icon').forEach(el=>el.style.zIndex='');
  });
  buildSidebar();
  buildMarkers();
  buildLegend();
}

if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',initMap);
else initMap();
</script>

  </div>
</div>
